# =============================================
# APPLICATION PROPERTIES -- Step 04: Introduction to JPA
# =============================================
# NEW: Database connection and JPA configuration.
#
# PATTERN: Spring Boot auto-configures JPA when it detects:
#   1. spring-boot-starter-data-jpa on the classpath (pom.xml)
#   2. A datasource URL in this file
# You don't need any @Configuration class -- it just works.
# =============================================

spring.application.name=IronBoard

# ---------------------------------------------------------
# MySQL Connection
# ---------------------------------------------------------
# URL format: jdbc:mysql://host:port/database_name
#
# TIP: If MySQL is on a different machine or port, change
# localhost:3306 accordingly. The default MySQL port is 3306.
spring.datasource.url=jdbc:mysql://localhost:3306/ironboard

spring.datasource.username=root

spring.datasource.password=password

# Spring Boot can auto-detect the driver from the URL, but
# explicit is better than implicit.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---------------------------------------------------------
# JPA / Hibernate Settings
# ---------------------------------------------------------

# DDL (Data Definition Language) = SQL statements that define
# database structure: CREATE TABLE, ALTER TABLE, DROP TABLE.
# ddl-auto controls what DDL Hibernate runs on startup:
#
#   update       - Adds missing tables/columns. Never drops. (DEVELOPMENT)
spring.jpa.hibernate.ddl-auto=update

# show-sql prints every SQL query Hibernate generates to the console.
# Essential for learning — you see exactly what JPA does.
spring.jpa.show-sql=true

# format-sql makes the printed SQL readable with line breaks
# and indentation. Without it, SQL prints as one long line.
spring.jpa.properties.hibernate.format_sql=true
